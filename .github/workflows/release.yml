name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Align POM version with tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mvn -B --no-transfer-progress org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages and build JAR
        run: |
          mvn -B --no-transfer-progress deploy \
            -DskipTests -DskipATs=true

      - name: Package JAR and ZIP for GitHub Release
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          OUT_JAR="bond-trading-framework-${VERSION}.jar"
          STAGE="bond-trading-framework-${VERSION}"

          mapfile -t jars < <(find target -maxdepth 1 -name "bond-trading-framework-*.jar" \
            ! -name "*-sources.jar" ! -name "*-javadoc.jar" | sort)
          if [[ ${#jars[@]} -ne 1 ]]; then
            echo "Expected exactly one main JAR in target/, found ${#jars[@]}: ${jars[*]}"
            exit 1
          fi
          cp "${jars[0]}" "$OUT_JAR"

          mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='target' \
            --exclude="$STAGE" \
            ./ "$STAGE/"
          cp "$OUT_JAR" "$STAGE/"

          zip -rq "bond-trading-framework-${VERSION}.zip" "$STAGE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bond-trading-framework-${{ steps.ver.outputs.version }}.jar
            bond-trading-framework-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
